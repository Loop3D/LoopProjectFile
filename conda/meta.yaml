{% set name = "loopprojectfile" %}
{% set version = "1.0.1" %}

package:
  name: "{{ name|lower }}"
  version: "{{ version }}"

source:
  git_url: https://github.com/Loop3D/LoopProjectFile
  git_tag: conda

build:
  number: 0
  script: "{{ PYTHON }} -m pip install ."

requirements:
  host:
    - pip
    - python
    - setuptools
  run:
    - numpy
    - pandas
    - netcdf4

# test:
#   imports:
#     - LoopProjectFile

about:
  home: "https://github.com/Loop3D/LoopProjectFile"
  license: MIT
  license_family: MIT
  license_file: 
  summary: "File that links backend processes to the Loop GUI."
  doc_url: 
  dev_url: 

extra:
  recipe-maintainers:
    - yohanderose